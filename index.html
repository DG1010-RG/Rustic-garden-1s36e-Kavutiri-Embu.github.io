<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Rustic Garden — Kavutiri, Embu-Kenya</title>
  <meta name="description" content="Land • Water • Observation — a minimal environmental interface.">

  <!-- Open Graph -->
  <meta property="og:title" content="Rustic Garden — Kavutiri">
  <meta property="og:description" content="Field observation of land and atmospheric patterns">
  <meta property="og:image" content="assets/radar.png">
  <meta property="og:type" content="website">

  <style>
    :root {
      --bg: #0b0f12;
      --text: #e6eeee;
      --muted: #7e9498;
      --accent: #6ee7d8;
      --line: rgba(255,255,255,0.05);
    }

    /* 🌙 Automatic night refinement (no JS) */
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7fbfb;
        --text: #0e1a1a;
        --muted: #5f7a7d;
        --line: rgba(0,0,0,0.06);
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      letter-spacing: 0.2px;
    }

    main {
      max-width: 760px;
      margin: 80px auto;
      padding: 0 18px;
    }

    header {
      margin-bottom: 60px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 500;
      margin: 0;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    section {
      margin-top: 48px;
    }

    h2 {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .frame {
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      margin-top: 14px;
    }

    img {
      width: 100%;
      display: block;
    }

    .actions {
      margin-top: 14px;
    }

    .btn {
      font-size: 0.8rem;
      text-decoration: none;
      color: var(--text);
      border-bottom: 1px solid var(--line);
      padding-bottom: 2px;
    }

    .btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    iframe {
      width: 100%;
      height: 380px;
      border: none;
      margin-top: 12px;
    }

    footer {
      margin-top: 80px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>

<body>

<main>

  <header>
    <h1>Rustic Garden — Kavutiri</h1>
    <div class="subtitle">Land • Water • Observation</div>
  </header>

  <!-- 🌍 Radar -->
  <section>
    <h2>Atmosphere</h2>
    <p>Wind movement and weather structure.</p>

    <div class="frame">
      <img src="assets/radar.png" alt="Radar snapshot">
    </div>

    <div class="actions">
      <a class="btn" href="#" onclick="loadRadar(); return false;">
        View live
      </a>
    </div>

    <div id="radar"></div>
  </section>

  <!-- 📍 Map -->
  <section>
    <h2>Ground</h2>
    <p>Nyaga Garden — spatial reference (WGS84).</p>

    <div class="frame">
      <img src="assets/map.png" alt="Garden map">
    </div>

    <div class="actions">
      <a class="btn" href="assets/Nyaga_Garden_map.kml">
        Download KML
      </a>
    </div>
  </section>

  <!-- 🌿 Notes -->
  <section>
    <h2>Notes</h2>
    <p>
      Observe patterns.  
      Track moisture.  
      Let the system reveal itself.
    </p>
  </section>

  <footer>
    Minimal interface · No tracking · No noise
  </footer>

</main>

<script>
function loadRadar() {
  const el = document.getElementById("radar");
  if (el.innerHTML) return;

  el.innerHTML = `
    <iframe src="https://zoom.earth/maps/radar/#view=0.6,37.8,4z/place=-1.285398325245881,36.73422197843284/overlays=wind,crosshair"></iframe>
  `;
}
</script>

</body>
</html>
